<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwipeRight">
<meta name="theme-color" content="#0F1117">
<title>SwipeRight — Card Optimizer</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #22263A;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #F0F0F0;
  --muted: #8A8FA8;
  --accent: #4AE5A2;
  --accent2: #7B6EF6;
  --gold: #FFD166;
  --danger: #FF6B6B;
  --card-r: 16px;
  --pill-r: 999px;
  font-size: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; min-height: 100dvh; overflow-x: hidden; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

/* ── APP SHELL ── */
.app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

/* ── HEADER ── */
header { padding: 56px 20px 16px; background: linear-gradient(180deg, rgba(74,229,162,0.06) 0%, transparent 100%); }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-mark svg { width: 20px; height: 20px; fill: #0F1117; }
.logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }
.tagline { font-size: 13px; color: var(--muted); padding-left: 46px; }

/* ── TABS ── */
.tab-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 16px 20px 0; }
.tab { padding: 10px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.18s; }
.tab svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
.tab.active { background: var(--surface2); color: var(--accent); border-color: rgba(74,229,162,0.3); }
.tab:active { transform: scale(0.97); }

/* ── PANELS ── */
.panels { flex: 1; padding: 20px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; display: block; }
#vendorInput { width: 100%; padding: 14px 14px 14px 44px; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none; }
#vendorInput::placeholder { color: var(--muted); }
#vendorInput:focus { border-color: rgba(74,229,162,0.5); }
.suggestions { background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; overflow: hidden; margin-top: -8px; margin-bottom: 12px; display: none; }
.suggestion { padding: 12px 16px; font-size: 14px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.suggestion:last-child { border-bottom: none; }
.suggestion:active { background: var(--surface); }
.suggestion-cat { font-size: 11px; color: var(--accent); background: rgba(74,229,162,0.1); padding: 2px 8px; border-radius: 99px; margin-left: auto; }

/* ── RESULTS ── */
.results-header { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.results-header strong { color: var(--text); font-weight: 600; }
.card-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px; transition: border-color 0.15s; }
.card-result.best { border-color: rgba(74,229,162,0.4); background: linear-gradient(135deg, rgba(74,229,162,0.05) 0%, var(--surface) 60%); }
.rank-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.rank-1 { background: rgba(74,229,162,0.15); color: var(--accent); }
.rank-2 { background: rgba(123,110,246,0.15); color: var(--accent2); }
.rank-3 { background: rgba(138,143,168,0.15); color: var(--muted); }
.result-name { font-size: 15px; font-weight: 600; color: var(--text); }
.result-earn { font-size: 14px; color: var(--accent); font-weight: 500; margin-top: 3px; }
.result-why { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.best-badge { display: inline-block; font-size: 10px; background: var(--accent); color: #0F1117; padding: 2px 8px; border-radius: 99px; font-weight: 700; margin-left: 8px; vertical-align: 1px; }
.tip { background: rgba(255,209,102,0.08); border: 1px solid rgba(255,209,102,0.2); border-radius: 12px; padding: 10px 14px; font-size: 12px; color: var(--gold); margin-top: 4px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
.no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.no-results .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

/* ── QUICK TAP ── */
.qt-label { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; font-size: 11px; }
.qt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.qt-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; cursor: pointer; transition: all 0.15s; text-align: left; }
.qt-btn:active { transform: scale(0.97); border-color: var(--border2); }
.qt-icon { font-size: 24px; margin-bottom: 8px; display: block; }
.qt-name { font-size: 14px; font-weight: 600; color: var(--text); }
.qt-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.qt-earn { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 500; }
.qt-section-title { font-size: 15px; font-weight: 600; margin: 0 0 12px; color: var(--text); }

/* ── GPS ── */
.gps-hero { text-align: center; padding: 24px 0 20px; }
.gps-pulse-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(74,229,162,0.1); border: 2px solid rgba(74,229,162,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; cursor: pointer; transition: all 0.2s; position: relative; }
.gps-pulse-btn:active { transform: scale(0.95); }
.gps-pulse-btn svg { width: 32px; height: 32px; stroke: var(--accent); fill: none; stroke-width: 2; }
.gps-pulse-btn.pulsing::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--accent); animation: pulse 1.2s ease-out infinite; }
@keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 0; transform: scale(1.4); } }
.gps-label { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.gps-sub { font-size: 13px; color: var(--muted); }
.nearby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.nearby-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.15s; }
.nearby-card:active { transform: scale(0.97); border-color: rgba(74,229,162,0.3); }
.nearby-name { font-size: 14px; font-weight: 600; color: var(--text); }
.nearby-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.nearby-dist { display: inline-block; font-size: 11px; color: var(--accent2); background: rgba(123,110,246,0.12); padding: 2px 7px; border-radius: 99px; margin-top: 6px; }
.nearby-best { font-size: 12px; color: var(--accent); margin-top: 8px; font-weight: 500; }

/* ── BACK BTN ── */
.back-btn { display: none; align-items: center; gap: 6px; font-size: 14px; color: var(--muted); cursor: pointer; margin-bottom: 16px; }
.back-btn.show { display: flex; }
.back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ── BOTTOM NAV SAFE AREA ── */
.bottom-spacer { height: env(safe-area-inset-bottom, 12px); }

/* ── INSTALL BANNER ── */
.install-banner { display: none; margin: 0 20px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; padding: 14px 16px; }
.install-banner.show { display: flex; align-items: center; gap: 12px; }
.install-body { flex: 1; }
.install-title { font-size: 14px; font-weight: 600; }
.install-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.install-btn { background: var(--accent); color: #0F1117; border: none; padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.install-close { color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
</style>
</head>

function norm(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,''); }
function findVendor(q){
  const nq = norm(q);
  for(const e of DB) for(const n of e.names) if(norm(n).includes(nq)||nq.includes(norm(n))) return e;
  return null;
}
function allNames(){ const a=[]; for(const e of DB) a.push(...e.names.map(n=>({name:n,cat:e.cat}))); return a; }

function renderResults(vendor, entry){
  const res = document.getElementById('results');
  if(!entry){
    res.innerHTML=`<div class="no-results"><div class="big-icon">🔍</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">No match for "${vendor}"</div><div style="font-size:13px;color:var(--muted)">Try: Publix, CVS, Shell, Amazon, Netflix…</div></div>`;
    return;
  }
  let h=`<div class="results-header">Best cards for <strong>${vendor}</strong> <span style="font-size:12px;color:var(--muted)">(${entry.cat})</span></div>`;
  entry.recs.forEach((r,i)=>{
    h+=`<div class="card-result ${i===0?'best':''}">
      <div class="rank-circle rank-${i+1}">${i+1}</div>
      <div>
        <div class="result-name">${r.card}${i===0?'<span class="best-badge">Best</span>':''}</div>
        <div class="result-earn">→ ${r.earn}</div>
        <div class="result-why">${r.why}</div>
      </div>
    </div>`;
  });
  h+=`<div class="tip">💡 Always confirm category coding on your first statement — some merchants code unexpectedly.</div>`;
  res.innerHTML = h;
  document.getElementById('back-search').classList.add('show');
  document.getElementById('search-wrap').style.display='none';
  document.getElementById('suggestions').style.display='none';
}

function lookup(){
  const v = document.getElementById('vendorInput').value.trim();
  if(!v) return;
  document.getElementById('suggestions').style.display='none';
  renderResults(v, findVendor(v));
}

function clearSearch(){
  document.getElementById('vendorInput').value='';
  document.getElementById('results').innerHTML='';
  document.getElementById('back-search').classList.remove('show');
  document.getElementById('search-wrap').style.display='';
  document.getElementById('suggestions').style.display='none';
  document.getElementById('vendorInput').focus();
}

function onInput(){
  const v = document.getElementById('vendorInput').value.trim();
  const sugg = document.getElementById('suggestions');
  if(v.length<2){sugg.style.display='none';return;}
  const q=norm(v);
  const matches = allNames().filter(x=>norm(x.name).includes(q)).slice(0,6);
  if(!matches.length){sugg.style.display='none';return;}
  sugg.innerHTML=matches.map(x=>`<div class="suggestion" onclick="selectSug('${x.name.replace(/'/g,"\\'")}')"><span>${x.name.charAt(0).toUpperCase()+x.name.slice(1)}</span><span class="suggestion-cat">${x.cat}</span></div>`).join('');
  sugg.style.display='block';
}

function selectSug(name){
  document.getElementById('vendorInput').value=name.charAt(0).toUpperCase()+name.slice(1);
  document.getElementById('suggestions').style.display='none';
  lookup();
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
}

function buildNearby(){

      <div class="nearby-name">${s.name}</div>

      <div class="nearby-dist">📍 ${s.dist}</div>
      <div class="nearby-best">${s.best}</div>
    </div>`).join('');
}

function nearbyPick(vendor, name){
  switchTab('search');

  renderResults(name, findVendor(vendor));
}

function startGPS(){
  const btn=document.getElementById('gps-btn');
  const label=document.getElementById('gps-label');
  const sub=document.getElementById('gps-sub');
  btn.classList.add('pulsing');
  label.textContent='Detecting…';
  if(!navigator.geolocation){
    btn.classList.remove('pulsing');
    label.textContent='GPS unavailable';
    sub.textContent='Showing nearby stores for Orlando area';
    buildNearby();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      btn.classList.remove('pulsing');
      label.textContent='Location found';
      sub.textContent=`${pos.coords.latitude.toFixed(3)}, ${pos.coords.longitude.toFixed(3)} — Orlando area stores`;
      buildNearby();
    },
    ()=>{
      btn.classList.remove('pulsing');
      label.textContent='Using Orlando area';
      sub.textContent='Showing common stores in your area';
      buildNearby();
    },
    {timeout:8000}
  );
}

// PWA install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('show');
});
function closeBanner(){ document.getElementById('install-banner').classList.remove('show'); }

document.getElementById('vendorInput').addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('suggestions').style.display='none';
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#suggestions')&&!e.target.closest('#vendorInput'))
    document.getElementById('suggestions').style.display='none';
});
